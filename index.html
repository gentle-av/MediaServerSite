<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Media Center</title>
    <meta name="theme-color" content="#fabd2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Media Center">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app">
        <nav class="main-nav">
            <button class="nav-btn" data-page="video" id="navVideo">
                <i class="fas fa-video"></i>
                <span>Видео</span>
            </button>
            <button class="nav-btn" data-page="audio" id="navAudio">
                <i class="fas fa-music"></i>
                <span>Аудио</span>
            </button>
        </nav>

        <div class="page-container" id="pageContainer">
            <div class="page" id="pageVideo">
                <div class="video-explorer">
                    <div class="explorer-header">
                        <button class="back-btn" id="videoBackBtn">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <div class="breadcrumbs" id="videoBreadcrumbs"></div>
                    </div>
                    <div class="content-grid" id="videoContent">
                        <div class="loading"><i class="fas fa-spinner fa-spin"></i> Загрузка...</div>
                    </div>
                </div>
            </div>

            <div class="page hidden" id="pageAudio">
                <div class="audio-library">
                    <div class="library-header">
                        <h2><i class="fas fa-album"></i> Альбомы</h2>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="albumSearch" placeholder="Поиск альбомов...">
                        </div>
                    </div>
                    <div class="albums-grid" id="albumsGrid">
                        <div class="loading"><i class="fas fa-spinner fa-spin"></i> Загрузка альбомов...</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="playerControlPage" class="player-control-page" style="display: none;">
            <div class="player-control-header">
                <div class="player-controls-center">
                    <button class="control-btn" id="seekBackwardBtn" title="Назад 10 секунд">
                        <i class="fas fa-backward"></i>
                    </button>
                    <button class="control-btn" id="playPauseBtn" title="Воспроизведение/Пауза">
                        <i class="fas fa-play"></i>
                    </button>
                    <button class="control-btn" id="seekForwardBtn" title="Вперед 10 секунд">
                        <i class="fas fa-forward"></i>
                    </button>
                    <button class="control-btn" id="fullscreenBtn" title="Полноэкранный режим">
                        <i class="fas fa-expand"></i>
                    </button>
                    <button class="control-btn close-file" id="closeFileBtn" title="Закрыть файл">
                        <i class="fas fa-times"></i>
                    </button>
                    <button class="control-btn delete-file" id="deleteFileBtn" title="Удалить файл">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>
            <div class="player-placeholder">
                <i class="fas fa-play-circle"></i>
                <div>Видео воспроизводится в Mediateka</div>
                <div style="font-size: 1rem; margin-top: 20px; color: var(--fg3);">Используйте кнопки управления выше</div>
            </div>
            <button class="close-control-page" title="Закрыть панель управления">
                <i class="fas fa-arrow-left"></i>
            </button>
        </div>

        <div class="audio-player-bar" id="audioPlayerBar" style="display: none;">
            <div class="player-album-art">
                <img id="playerAlbumArt" src="" alt="Album art">
            </div>
            <div class="player-info">
                <div class="player-track" id="playerTrack">—</div>
                <div class="player-album" id="playerAlbum">—</div>
                <div class="player-artist" id="playerArtist">—</div>
            </div>
            <div class="player-controls">
                <button class="player-btn" id="playerPrevBtn">
                    <i class="fas fa-backward-step"></i>
                </button>
                <button class="player-btn primary" id="playerPlayBtn">
                    <i class="fas fa-play"></i>
                </button>
                <button class="player-btn" id="playerNextBtn">
                    <i class="fas fa-forward-step"></i>
                </button>
                <button class="player-btn" id="playerStopBtn">
                    <i class="fas fa-stop"></i>
                </button>
            </div>
            <div class="player-volume">
                <i class="fas fa-volume-up"></i>
                <div class="volume-slider" id="volumeSlider">
                    <div class="volume-progress" id="volumeProgress"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="albumModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalAlbumTitle"></h3>
                <button class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="album-detail-art">
                    <img id="modalAlbumArt" src="" alt="Album art">
                </div>
                <div class="album-tracks" id="modalTracksList"></div>
            </div>
        </div>
    </div>

    <div class="loading-progress" id="loadingProgress">
        <div class="loading-progress-bar"></div>
    </div>
    <div id="notification" class="notification" style="display: none;"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/player.js"></script>
    <script src="js/audio-player.js"></script>
    <script src="js/video-explorer.js"></script>
    <script src="js/album-library.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
