<div id="tagEditorModal" class="tag-editor-modal" style="display: none">
  <div class="tag-editor-content">
    <div class="tag-editor-header">
      <h3><i class="fas fa-tags"></i> Редактор тегов</h3>
      <button class="tag-editor-close">&times;</button>
    </div>
    <div class="tag-editor-body">
      <form id="tagEditorForm">
        <div class="form-group">
          <label>Название</label
          ><input type="text" id="tagTitle" class="tag-input" />
        </div>
        <div class="form-group">
          <label>Артист</label
          ><input type="text" id="tagArtist" class="tag-input" />
        </div>
        <div class="form-group">
          <label>Альбом</label
          ><input type="text" id="tagAlbum" class="tag-input" />
        </div>
        <div class="form-group">
          <label>Жанр</label
          ><input type="text" id="tagGenre" class="tag-input" />
        </div>
        <div class="form-group">
          <label>Год</label><input type="text" id="tagYear" class="tag-input" />
        </div>
        <div class="form-group">
          <label>Номер трека</label
          ><input type="number" id="tagTrackNumber" class="tag-input" />
        </div>
      </form>
    </div>
    <div class="tag-editor-footer">
      <button id="tagSaveBtn" class="tag-save-btn">Сохранить</button>
      <button id="tagCancelBtn" class="tag-cancel-btn">Отмена</button>
    </div>
  </div>
</div>
