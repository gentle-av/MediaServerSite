<div id="deleteDialog" class="delete-dialog" style="display: none">
  <div class="delete-dialog-content">
    <div class="delete-dialog-header">
      <h3><i class="fas fa-trash-alt"></i> Удаление</h3>
    </div>
    <div class="delete-dialog-body">
      <p id="deleteMessage">Вы уверены, что хотите удалить этот файл?</p>
    </div>
    <div class="delete-dialog-footer">
      <button id="deleteCancelBtn" class="delete-btn cancel">Отмена</button>
      <button id="deleteConfirmBtn" class="delete-btn confirm">Удалить</button>
    </div>
  </div>
</div>
