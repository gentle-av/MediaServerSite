<div class="system-widget">
  <div class="sys-header">
    <i class="fas fa-sliders-h"></i>
    <span>Управление системой</span>
    <button class="sys-close">&times;</button>
  </div>
  <div class="sys-body">
    <div class="sys-section">
      <div class="sys-title">
        <i class="fas fa-desktop"></i> Системная громкость
      </div>
      <div id="sysVolume"></div>
    </div>
    <div class="sys-section">
      <div class="sys-title"><i class="fas fa-tv"></i> Телевизор</div>
      <div id="sysTvPower"></div>
    </div>
    <div class="sys-section">
      <div class="sys-title"><i class="fas fa-desktop"></i> Компьютер</div>
      <div id="sysComputer"></div>
    </div>
  </div>
</div>
