<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De-Phazz - Jelly Banquet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg0:#282828;--bg1:#3c3836;--bg2:#504945;--bg3:#665c54;--bg4:#7c6f64;--fg0:#fbf1c7;--fg1:#ebdbb2;--fg2:#d5c4a1;--fg3:#bdae93;--fg4:#a89984;--red:#fb4934;--green:#b8bb26;--yellow:#fabd2f;--blue:#83a598;--purple:#d3869b;--aqua:#8ec07c;--orange:#fe8019}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg0);color:var(--fg1);min-height:100vh;padding:40px 20px}
        .container{max-width:1200px;margin:0 auto}
        .player-header{display:flex;gap:30px;margin-bottom:40px;flex-wrap:wrap}
        .album-art{flex:0 0 300px}
        .album-art .frame{background:linear-gradient(135deg,var(--yellow),var(--orange));padding:12px;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.3)}
        .album-art .frame-inner{background:var(--bg2);padding:8px;border-radius:16px}
        .album-art img{width:100%;height:auto;border-radius:12px;display:block}
        .album-info{flex:1;display:flex;flex-direction:column;justify-content:center}
        .album-title{font-size:32px;font-weight:700;color:var(--fg0);margin-bottom:8px}
        .album-artist{font-size:20px;color:var(--yellow);margin-bottom:16px}
        .album-year{color:var(--fg3);margin-bottom:24px}
        .playback-controls{display:flex;gap:16px;align-items:center;margin-top:20px}
        .control-btn{width:48px;height:48px;border-radius:50%;background:var(--bg2);border:2px solid var(--bg3);color:var(--fg1);cursor:pointer;font-size:20px;transition:all 0.2s}
        .control-btn:hover{background:var(--bg3);border-color:var(--yellow);color:var(--yellow);transform:scale(1.05)}
        .control-btn.primary{background:var(--yellow);border-color:var(--orange);color:var(--bg0)}
        .control-btn.primary:hover{transform:scale(1.1)}
        .volume-slider{width:120px;height:4px;background:var(--bg3);border-radius:2px;position:relative;cursor:pointer}
        .volume-progress{height:100%;background:var(--yellow);border-radius:2px;width:70%}
        .track-list{background:var(--bg1);border-radius:20px;padding:20px;border:1px solid var(--bg3)}
        .track-list-title{font-size:20px;font-weight:600;margin-bottom:20px;color:var(--fg0);display:flex;align-items:center;gap:10px}
        .track-list-title i{color:var(--yellow)}
        .track-item{display:flex;align-items:center;padding:12px 16px;margin-bottom:8px;background:var(--bg2);border-radius:12px;cursor:pointer;transition:all 0.2s;border:1px solid var(--bg3)}
        .track-item:hover{background:var(--bg3);border-color:var(--yellow);transform:translateX(5px)}
        .track-item.active{background:var(--bg3);border-color:var(--yellow);box-shadow:0 0 10px rgba(250,189,47,0.3)}
        .track-number{width:40px;font-weight:600;color:var(--yellow)}
        .track-name{flex:1;font-size:16px}
        .track-duration{width:60px;font-size:13px;color:var(--fg3)}
        .track-play-btn{width:32px;height:32px;border-radius:50%;background:var(--bg1);border:none;color:var(--fg1);cursor:pointer;margin-left:12px;transition:all 0.2s}
        .track-play-btn:hover{background:var(--yellow);color:var(--bg0)}
        .now-playing{background:var(--bg1);border-radius:20px;padding:16px 24px;margin-top:20px;border-left:4px solid var(--yellow);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
        .now-playing-info{flex:1}
        .now-playing-label{font-size:12px;color:var(--fg3);text-transform:uppercase;letter-spacing:1px}
        .now-playing-title{font-size:18px;font-weight:600;color:var(--fg0)}
        .now-playing-status{display:flex;align-items:center;gap:12px}
        .status-badge{padding:4px 12px;border-radius:20px;font-size:12px;background:var(--bg2);color:var(--fg2)}
        .status-badge.playing{background:var(--green);color:var(--bg0)}
        .status-badge.paused{background:var(--yellow);color:var(--bg0)}
        .loading{text-align:center;padding:40px;color:var(--fg3)}
        .loading i{animation:spin 1s linear infinite;font-size:32px}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .notification{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;z-index:1000;animation:slideIn 0.3s;display:flex;align-items:center;gap:10px}
        .notification.success{background:var(--green);color:var(--bg0)}
        .notification.error{background:var(--red);color:var(--bg0)}
        .notification.info{background:var(--yellow);color:var(--bg0)}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .server-input{background:var(--bg2);border-radius:12px;padding:12px;margin-bottom:20px;display:flex;gap:12px;align-items:center;border:1px solid var(--bg3)}
        .server-input input{flex:1;padding:8px 12px;background:var(--bg1);border:1px solid var(--bg3);border-radius:8px;color:var(--fg1);font-family:monospace}
        .server-input input:focus{outline:none;border-color:var(--yellow)}
        @media (max-width:768px){.player-header{flex-direction:column;align-items:center;text-align:center}.album-art{flex:0 0 250px}.track-item{padding:8px 12px}.track-name{font-size:14px}}
    </style>
</head>
<body>
<div class="container">
    <div class="server-input">
        <i class="fas fa-server"></i>
        <input type="text" id="serverUrl" value="http://localhost:8083">
        <button class="control-btn" style="width:auto;padding:8px 16px;border-radius:8px" onclick="updateServerUrl()"><i class="fas fa-check"></i> Применить</button>
    </div>
    <div class="player-header">
        <div class="album-art">
            <div class="frame">
                <div class="frame-inner">
                    <img id="albumCover" src="" alt="Album cover">
                </div>
            </div>
        </div>
        <div class="album-info">
            <div class="album-title">Jelly Banquet</div>
            <div class="album-artist">De-Phazz</div>
            <div class="album-year"><i class="far fa-calendar-alt"></i> 2022</div>
            <div class="playback-controls">
                <button class="control-btn" id="prevBtn" onclick="prevTrack()"><i class="fas fa-backward-step"></i></button>
                <button class="control-btn primary" id="playPauseBtn" onclick="togglePlayPause()"><i class="fas fa-play"></i></button>
                <button class="control-btn" id="nextBtn" onclick="nextTrack()"><i class="fas fa-forward-step"></i></button>
                <button class="control-btn" onclick="stopPlayback()"><i class="fas fa-stop"></i></button>
                <button class="control-btn" onclick="clearPlaylist()"><i class="fas fa-trash"></i></button>
                <div class="volume-slider" id="volumeSlider" onclick="setVolume(event)">
                    <div class="volume-progress" id="volumeProgress"></div>
                </div>
                <i class="fas fa-volume-up" style="color:var(--fg3)"></i>
            </div>
        </div>
    </div>
    <div class="track-list">
        <div class="track-list-title"><i class="fas fa-list"></i> Треки альбома</div>
        <div id="trackListContainer"></div>
    </div>
    <div class="now-playing">
        <div class="now-playing-info">
            <div class="now-playing-label">Сейчас играет</div>
            <div class="now-playing-title" id="nowPlayingTitle">—</div>
        </div>
        <div class="now-playing-status">
            <div class="status-badge" id="statusBadge">Остановлено</div>
        </div>
    </div>
</div>
<div id="notification" style="display:none"></div>

<script>
const albumPath = '/mnt/media/music/De-Phazz/2022 - Jelly Banquet/';
let currentServerUrl = localStorage.getItem('serverUrl') || 'http://localhost:8083';
let tracks = [];
let currentTrackIndex = -1;
let statusPollInterval = null;

const trackFiles = [
    '01. Need to Be Strong.flac',
    '02. No Jelly.flac',
    '03. Jazz Music.flac',
    '04. The Mambo Craze.flac',
    '05. Death by Chocolate.flac',
    '06. Something Special.flac',
    '07. Astrud Astronette.flac',
    '08. Cafe Coca.flac',
    '09. Man Woman.flac',
    '10. Anchorless.flac',
    '11. Jazz Music (Reprise).flac'
];

document.getElementById('serverUrl').value = currentServerUrl;

function updateServerUrl() {
    currentServerUrl = document.getElementById('serverUrl').value;
    localStorage.setItem('serverUrl', currentServerUrl);
    loadAlbumCover();
    showNotification('Сервер обновлен: ' + currentServerUrl, 'info');
}

function getImageUrl() {
    const firstTrack = encodeURIComponent(albumPath + trackFiles[0]);
    return currentServerUrl + '/api/music/albumart?path=' + firstTrack;
}

function getApiUrl(action, path = null) {
    let url = currentServerUrl + '/api/music/' + action;
    if (path) {
        return url;
    }
    return url;
}

function loadAlbumCover() {
    const img = document.getElementById('albumCover');
    img.src = getImageUrl();
    img.onerror = () => {
        img.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect fill="%23504945" width="100" height="100"/%3E%3Ctext x="50" y="55" text-anchor="middle" fill="%23bdae93" font-size="12"%3ENo art%3C/text%3E%3C/svg%3E';
    };
}

function showNotification(msg, type) {
    const n = document.getElementById('notification');
    n.className = 'notification ' + type;
    n.innerHTML = '<i class="fas ' + (type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle') + '"></i> ' + msg;
    n.style.display = 'flex';
    setTimeout(() => { n.style.display = 'none'; }, 3000);
}

async function callApi(action, data = null) {
    try {
        const options = {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        };
        if (data) {
            options.body = JSON.stringify(data);
        }
        const response = await fetch(getApiUrl(action), options);
        const result = await response.json();
        if (!result.success && action !== 'status') {
            showNotification(result.error || 'Ошибка', 'error');
        }
        return result;
    } catch (error) {
        showNotification('Ошибка соединения с сервером', 'error');
        return null;
    }
}

async function loadPlaylist() {
    for (let i = 0; i < trackFiles.length; i++) {
        const trackPath = albumPath + trackFiles[i];
        await callApi('add', { path: trackPath });
    }
    tracks = trackFiles;
    renderTrackList();
    showNotification('Загружено ' + tracks.length + ' треков', 'success');
}

async function playTrack(index) {
    if (index < 0 || index >= tracks.length) return;
    const trackPath = albumPath + tracks[index];
    const result = await callApi('open', { path: trackPath });
    if (result && result.success) {
        currentTrackIndex = index;
        updateNowPlaying();
        renderTrackList();
        startStatusPolling();
        showNotification('Играет: ' + tracks[index], 'info');
    }
}

async function togglePlayPause() {
    const status = await callApi('status');
    if (status && status.isPlaying) {
        await callApi('pause');
        showNotification('Пауза', 'info');
    } else if (status && status.isPaused) {
        await callApi('play');
        showNotification('Воспроизведение', 'info');
    } else if (currentTrackIndex >= 0) {
        await playTrack(currentTrackIndex);
    } else if (tracks.length > 0) {
        await playTrack(0);
    }
    updatePlayPauseButton();
}

async function nextTrack() {
    if (tracks.length === 0) return;
    const nextIdx = (currentTrackIndex + 1) % tracks.length;
    await playTrack(nextIdx);
}

async function prevTrack() {
    if (tracks.length === 0) return;
    const prevIdx = (currentTrackIndex - 1 + tracks.length) % tracks.length;
    await playTrack(prevIdx);
}

async function stopPlayback() {
    await callApi('stop');
    currentTrackIndex = -1;
    updateNowPlaying();
    renderTrackList();
    updatePlayPauseButton();
    showNotification('Остановлено', 'info');
}

async function clearPlaylist() {
    await callApi('clear');
    tracks = [];
    currentTrackIndex = -1;
    renderTrackList();
    updateNowPlaying();
    updatePlayPauseButton();
    showNotification('Плейлист очищен', 'success');
}

async function setVolume(event) {
    const slider = document.getElementById('volumeSlider');
    const rect = slider.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const percent = Math.min(100, Math.max(0, (x / rect.width) * 100));
    document.getElementById('volumeProgress').style.width = percent + '%';
}

function renderTrackList() {
    const container = document.getElementById('trackListContainer');
    if (!container) return;
    if (tracks.length === 0) {
        container.innerHTML = '<div class="loading"><i class="fas fa-circle-notch"></i> Загрузка треков...</div>';
        return;
    }
    container.innerHTML = tracks.map((track, idx) => `
        <div class="track-item ${currentTrackIndex === idx ? 'active' : ''}" onclick="playTrack(${idx})">
            <div class="track-number">${String(idx + 1).padStart(2, '0')}</div>
            <div class="track-name">${track.replace(/^\d+\.\s*/, '').replace('.flac', '')}</div>
            <div class="track-duration"><i class="far fa-clock"></i></div>
            <button class="track-play-btn" onclick="event.stopPropagation(); playTrack(${idx})">
                <i class="fas fa-play"></i>
            </button>
        </div>
    `).join('');
}

function updateNowPlaying() {
    const title = document.getElementById('nowPlayingTitle');
    if (currentTrackIndex >= 0 && tracks[currentTrackIndex]) {
        title.textContent = tracks[currentTrackIndex].replace(/^\d+\.\s*/, '').replace('.flac', '');
    } else {
        title.textContent = '—';
    }
}

async function updatePlayPauseButton() {
    const btn = document.getElementById('playPauseBtn');
    const status = await callApi('status');
    if (status && status.isPlaying) {
        btn.innerHTML = '<i class="fas fa-pause"></i>';
        document.getElementById('statusBadge').className = 'status-badge playing';
        document.getElementById('statusBadge').innerHTML = '<i class="fas fa-play"></i> Играет';
    } else if (status && status.isPaused) {
        btn.innerHTML = '<i class="fas fa-play"></i>';
        document.getElementById('statusBadge').className = 'status-badge paused';
        document.getElementById('statusBadge').innerHTML = '<i class="fas fa-pause"></i> На паузе';
    } else {
        btn.innerHTML = '<i class="fas fa-play"></i>';
        document.getElementById('statusBadge').className = 'status-badge';
        document.getElementById('statusBadge').innerHTML = '<i class="fas fa-stop"></i> Остановлено';
    }
}

async function getStatus() {
    const status = await callApi('status');
    if (status) {
        if (status.currentFile && status.currentFile !== '') {
            const fileName = status.currentFile.split('/').pop();
            const idx = tracks.findIndex(t => t === fileName);
            if (idx !== -1 && currentTrackIndex !== idx) {
                currentTrackIndex = idx;
                renderTrackList();
                updateNowPlaying();
            }
        } else if (currentTrackIndex !== -1 && !status.isPlaying && !status.isPaused) {
            currentTrackIndex = -1;
            renderTrackList();
            updateNowPlaying();
        }
        updatePlayPauseButton();
    }
}

function startStatusPolling() {
    if (statusPollInterval) clearInterval(statusPollInterval);
    statusPollInterval = setInterval(getStatus, 1000);
}

loadAlbumCover();
loadPlaylist();
startStatusPolling();

window.addEventListener('beforeunload', () => {
    if (statusPollInterval) clearInterval(statusPollInterval);
});
</script>
</body>
</html>
